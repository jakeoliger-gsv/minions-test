<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-shell">
  <nav id="tab-bar">
    <button class="active" data-tab="calculator">Calculator</button>
    <button data-tab="compound-interest">Compound Interest</button>
    <button data-tab="planetary-weight">Planetary Weight</button>
  </nav>
  <section id="panel-calculator" class="tab-panel active">
<div class="calculator">
  <div class="theme-picker">
    <label for="theme-select" class="theme-picker-label">Theme</label>
    <select id="theme-select">
      <option value="">Default</option>
      <option value="halloween">Halloween</option>
      <option value="dark-mode">Dark Mode</option>
      <option value="childrens">Children's</option>
      <option value="monolith">2001: A Space Odyssey</option>
      <option value="minions">Minions</option>
      <option value="marvel-ironman">Marvel/Iron Man</option>
      <option value="coffee-lovers">Coffee Lovers</option>
      <option value="roman">Roman</option>
    </select>
  </div>
  <div class="ghost-emoji" id="ghost-emoji" aria-hidden="true">&#x1F47B;</div>
  <div class="monolith-emoji" id="monolith-emoji" aria-hidden="true"></div>
  <div class="coffee-emoji" id="coffee-emoji" aria-hidden="true">&#x2615;</div>

  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons sci-buttons">
    <button class="btn fn" data-action="sqrt">&#x221A;</button>
    <button class="btn fn" data-action="log">log</button>
    <button class="btn fn" data-action="sin">sin</button>
    <button class="btn fn" data-action="cos">cos</button>
    <button class="btn fn" data-action="tan">tan</button>
    <button class="btn fn" data-action="jakify">Jakify</button>
  </div>

  <div class="buttons main-buttons">
    <button class="btn util" data-action="clear">Clear</button>
    <button class="btn operator" data-value="/">&#xF7;</button>
    <button class="btn operator" data-value="*">&#xD7;</button>
    <button class="btn operator" data-value="-">&minus;</button>

    <button class="btn digit" data-value="7">7</button>
    <button class="btn digit" data-value="8">8</button>
    <button class="btn digit" data-value="9">9</button>
    <button class="btn operator" data-value="+">+</button>

    <button class="btn digit" data-value="4">4</button>
    <button class="btn digit" data-value="5">5</button>
    <button class="btn digit" data-value="6">6</button>
    <button class="btn equals" data-action="equals">=</button>

    <button class="btn digit" data-value="1">1</button>
    <button class="btn digit" data-value="2">2</button>
    <button class="btn digit" data-value="3">3</button>

    <button class="btn digit zero" data-value="0">0</button>
    <button class="btn digit dot" data-value=".">.</button>
  </div>
</div>
  </section>
  <section id="panel-compound-interest" class="tab-panel">
<div class="ci-panel">
  <h2 class="ci-title">Compound Interest Calculator</h2>

  <div class="ci-field">
    <label for="ci-principal">Lump Sum Principal ($)</label>
    <input type="number" id="ci-principal" min="0" step="0.01" value="0">
  </div>
  <div class="ci-field">
    <label for="ci-rate">Annual Interest Rate (%)</label>
    <input type="number" id="ci-rate" min="0" step="0.01" value="0">
  </div>
  <div class="ci-field">
    <label for="ci-monthly">Monthly Contribution ($)</label>
    <input type="number" id="ci-monthly" min="0" step="0.01" value="0">
  </div>
  <div class="ci-field">
    <label for="ci-years">Number of Years</label>
    <input type="number" id="ci-years" min="1" step="1" value="10">
  </div>

  <button type="button" class="btn ci-calculate" id="ci-calculate">Calculate</button>

  <div class="ci-error" id="ci-error" role="alert"></div>

  <div class="ci-results" id="ci-results" hidden>
    <div class="ci-summary">
      <div class="ci-summary-item">
        <span class="ci-summary-label">Final Balance</span>
        <span class="ci-summary-value" id="ci-final-balance"></span>
      </div>
      <div class="ci-summary-item">
        <span class="ci-summary-label">Total Contributed</span>
        <span class="ci-summary-value" id="ci-total-contributed"></span>
      </div>
      <div class="ci-summary-item">
        <span class="ci-summary-label">Total Interest</span>
        <span class="ci-summary-value" id="ci-total-interest"></span>
      </div>
    </div>

    <div class="ci-view-label" id="ci-view-label"></div>

    <div id="ci-table">
      <table>
        <thead>
          <tr>
            <th>Period</th>
            <th>Balance</th>
            <th>Interest Earned</th>
            <th>Contribution</th>
          </tr>
        </thead>
        <tbody id="ci-table-body"></tbody>
      </table>
    </div>
  </div>
</div>
  </section>
  <section id="panel-planetary-weight" class="tab-panel"></section>
</div>
<script src="script.js"></script>
</body>
</html>
